packages:
  - packages/*
  - workers/*

# Dedupe @cloudflare/workers-types onto the v5 that packages/louise targets.
# wrangler declares an optional ^4 peer, which otherwise pulls a second (v4) copy
# into workers/site + workers/sandbox — splitting drizzle-orm into two
# peer-keyed instances and producing spurious cross-version type errors.
# workers-types is types-only, so pinning wrangler's optional peer forward to v5
# has no runtime effect.
overrides:
  "@cloudflare/workers-types": "^5.20260714.1"

# GHSA-67mh-4wv8-2f99 — esbuild <=0.24.2 lets any website talk to its dev SERVER.
#
# It reaches us only through a legacy compat path: better-auth → drizzle-kit →
# @esbuild-kit/esm-loader → @esbuild-kit/core-utils, which pins esbuild 0.18.20.
# drizzle-kit's own direct dependency is already a safe `esbuild ^0.25.4`; the old
# copy rides in on `@esbuild-kit/*`, which upstream has deprecated ("merged into
# tsx"). There is no drizzle-kit release that drops it — 0.31.10 is current and
# still carries it.
#
# SCOPED to that one parent rather than a blanket `esbuild` override, so Vite,
# Astro, and everything else keep whatever they resolved. Verified after the
# bump that drizzle-kit still transpiles a TypeScript drizzle.config.ts, which is
# the code path this package exists to serve — the risk being that
# @esbuild-kit/core-utils was written against the 0.18 API.
#
# Nothing here ever runs `esbuild --serve`, so this was low severity in practice;
# it is fixed because a scoped override is cheap, not because it was urgent.
  "@esbuild-kit/core-utils>esbuild": "^0.25.4"

# Postinstall-script approvals. Without these, esbuild/workerd skip their
# postinstall and the Astro (Cloudflare) build fails. pnpm 11 renamed the
# `onlyBuiltDependencies` list to the `allowBuilds` map.
#
# `sharp: false` explicitly disallows its native postinstall (#84). We no longer
# depend on it directly — image work moved to the Cloudflare Images binding, the
# Cloudflare adapter externalizes sharp + uses its workerd image service, and the
# docs use `passthroughImageService`. sharp still arrives as an *optional* dep of
# `astro`, so we pin it off here to skip the heavy native build rather than have
# pnpm prompt on every install.
allowBuilds:
  esbuild: true
  sharp: false
  workerd: true
